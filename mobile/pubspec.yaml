name: mybudget
description: Family budget tracking app
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.8.4

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Secure storage & biometrics
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0

  # Camera & file picking
  image_picker: ^1.1.2
  file_picker: ^8.3.7

  # Charts
  fl_chart: ^0.70.2

  # Money math
  decimal: ^3.2.1

  # CSV parsing
  csv: ^6.0.0

  # Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  shared_preferences: ^2.3.5

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.1
  freezed: ^2.5.8
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
